<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1A17"/>
      <stop offset="100%" stop-color="#070F0D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="rgba(45,139,110,0.15)" stroke-width="2"/>

  <!-- Logo icon (index bars + amber dot) -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="44" height="6" rx="3" fill="#2D8B6E"/>
    <rect x="0" y="20" width="56" height="6" rx="3" fill="#3AA882"/>
    <rect x="0" y="40" width="36" height="6" rx="3" fill="#2D8B6E"/>
    <rect x="0" y="60" width="50" height="6" rx="3" fill="#2D8B6E" opacity="0.5"/>
    <circle cx="64" cy="23" r="8" fill="#D4915A"/>
  </g>

  <!-- Wordmark -->
  <text x="168" y="230" font-family="'DM Sans', -apple-system, sans-serif" font-weight="700" font-size="56" fill="#E8EDE9" letter-spacing="-1">Cannabisers</text>

  <!-- Tagline -->
  <text x="82" y="310" font-family="'DM Sans', -apple-system, sans-serif" font-weight="400" font-size="28" fill="#9BAFA5">The testing labs, attorneys, and consultants</text>
  <text x="82" y="350" font-family="'DM Sans', -apple-system, sans-serif" font-weight="400" font-size="28" fill="#9BAFA5">cannabis operators use.</text>

  <!-- Stats bar at bottom -->
  <rect x="0" y="470" width="1200" height="160" fill="#152B25"/>

  <text x="200" y="535" font-family="'DM Sans', -apple-system, sans-serif" font-weight="700" font-size="36" fill="#3AA882" text-anchor="middle">18</text>
  <text x="200" y="570" font-family="'DM Sans', -apple-system, sans-serif" font-weight="400" font-size="16" fill="#5C7A6E" text-anchor="middle">Service Categories</text>

  <text x="600" y="535" font-family="'DM Sans', -apple-system, sans-serif" font-weight="700" font-size="36" fill="#3AA882" text-anchor="middle">36</text>
  <text x="600" y="570" font-family="'DM Sans', -apple-system, sans-serif" font-weight="400" font-size="16" fill="#5C7A6E" text-anchor="middle">Legal States</text>

  <text x="1000" y="535" font-family="'DM Sans', -apple-system, sans-serif" font-weight="700" font-size="36" fill="#3AA882" text-anchor="middle">100%</text>
  <text x="1000" y="570" font-family="'DM Sans', -apple-system, sans-serif" font-weight="400" font-size="16" fill="#5C7A6E" text-anchor="middle">Free to Search</text>

  <!-- Dividers between stats -->
  <line x1="400" y1="510" x2="400" y2="580" stroke="rgba(45,139,110,0.2)" stroke-width="1"/>
  <line x1="800" y1="510" x2="800" y2="580" stroke="rgba(45,139,110,0.2)" stroke-width="1"/>
</svg>
